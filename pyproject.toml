[tool.mypy]
plugins = ["pydantic.mypy"]

[tool.pydantic-mypy]
init_forbid_extra = true
warn_required_dynamic_aliases = true

[tool.ruff]
target-version = "py311"
line-length = 110

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.per-file-ignores]
# 인라인 HTML/CSS 템플릿 문자열 모듈 — 마크업·스타일 라인은 줄 길이 제한 예외.
"core/report/html.py" = ["E501"]
